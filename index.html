<style>
  :root{
    --bg: #101a22; --bg-2: #16232d; --card: #1b2934; --card-2: #223240;
    --line: #2b3d4a; --ink: #eee7da; --ink-dim: #93a6b0;
    --gold: #c9a227; --gold-soft: #e3c568; --teal: #5fa38c; --coral: #c1694f;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 800px at 10% -10%, #17262f 0%, var(--bg) 55%);
    color: var(--ink); font-family:'Inter',sans-serif; min-height:100vh; padding:0 0 60px 0;
  }
  .wrap{max-width:720px; margin:0 auto; padding:24px 16px;}
  .top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .brand{font-family:'Fraunces',serif; font-weight:600; font-size:14px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-soft);}
  .datebadge{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-dim);}
  h1{font-family:'Fraunces',serif; font-weight:600; font-size:26px; line-height:1.15; margin:4px 0 6px 0;}
  .sub{color:var(--ink-dim); font-size:13.5px; margin-bottom:14px;}

  .review-banner{background:rgba(201,162,39,0.12); border:1px solid rgba(201,162,39,0.4); color:var(--gold-soft); border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner{background: rgba(193,105,79,0.12); border:1px solid rgba(193,105,79,0.4); color:#e8b6a5; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner b{color:#f0c9bc;}

  .stats{display:flex; gap:10px; margin-bottom:14px;}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 12px;}
  .stat .n{font-family:'Fraunces',serif; font-size:20px; font-weight:600; color:var(--gold-soft);}
  .stat .l{font-size:10.5px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-top:2px;}

  .rail{display:flex; gap:3px; margin:12px 0 16px 0;}
  .rail .seg{flex:1; height:6px; border-radius:3px; background:var(--line);}
  .rail .seg.done{background:var(--teal);}
  .rail .seg.current{background:var(--gold);}
  .rail .seg.missed{background:var(--coral); opacity:.55;}
  .rail .seg.review{background:#7a6bc4;}

  .card{background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:14px;}
  .card-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:2px; flex-wrap:wrap;}
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.06em; color:var(--gold-soft); text-transform:uppercase;}

  .navbtns{display:flex; gap:6px; flex-wrap:wrap;}
  .navbtn{background:var(--bg-2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:7px 11px; font-size:12px; cursor:pointer; font-family:'Inter';}
  .navbtn:hover{border-color:var(--gold);}
  .navbtn:disabled{opacity:.3; cursor:not-allowed;}
  .navbtn.hi{border-color:var(--gold); color:var(--gold-soft);}

  .task{border:1px solid var(--line); border-radius:10px; margin-top:10px; overflow:hidden; background:rgba(255,255,255,.015);}
  .task-head{display:flex; align-items:flex-start; gap:12px; padding:12px 14px; cursor:pointer;}
  .check{width:21px; height:21px; border-radius:6px; border:1.5px solid var(--ink-dim); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--bg); transition:all .15s ease;}
  .check.on{background:var(--teal); border-color:var(--teal); color:#0d1a16;}
  .task-label{flex:1;}
  .task-tag{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--gold-soft);}
  .task-title{font-size:14px; margin-top:2px;}
  .task-title.done{color:var(--ink-dim); text-decoration:line-through; text-decoration-color:var(--line);}
  .chev{color:var(--ink-dim); font-size:12px; margin-top:4px; transition:transform .15s ease;}
  .task.open .chev{transform:rotate(180deg);}
  .task-body{max-height:0; overflow:hidden; transition:max-height .3s ease; padding:0 14px; font-size:13px; line-height:1.6; color:var(--ink-dim); white-space:pre-line;}
  .task.open .task-body{padding:0 14px 14px 14px;}
  .time{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-dim); margin-left:6px;}

  .persist-warn{font-size:12px; color:var(--coral); text-align:center; margin-top:10px;}

  .sync-panel{background:var(--bg-2); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:18px;}
  .sync-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .sync-dot{width:8px; height:8px; border-radius:50%; background:var(--ink-dim); flex-shrink:0;}
  .sync-dot.ok{background:var(--teal);}
  .sync-dot.offline{background:var(--coral);}
  .sync-dot.checking{background:var(--gold); animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.3;}}
  .sync-label{font-size:12.5px; color:var(--ink-dim); flex:1;}
  .sync-code{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--gold-soft); background:var(--card); border:1px solid var(--line); border-radius:6px; padding:4px 9px; cursor:pointer; letter-spacing:.05em;}
  .sync-hint{font-size:11.5px; color:var(--ink-dim); margin-top:8px;}
  .sync-link-row{display:flex; gap:8px; margin-top:10px;}
  .sync-input{flex:1; background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 10px; font-family:'JetBrains Mono',monospace; font-size:12.5px;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:11px; color:var(--ink-dim); margin-top:16px;}
  .legend span{display:flex; align-items:center; gap:5px;}
  .dot{width:8px; height:8px; border-radius:2px; display:inline-block;}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAf6YA-KJ9eohe7P5EtXPSZQCqOavsr4U8",
  authDomain: "piano-inglese.firebaseapp.com",
  projectId: "piano-inglese",
  storageBucket: "piano-inglese.firebasestorage.app",
  messagingSenderId: "34982813106",
  appId: "1:34982813106:web:bd597fe7c9d258057558ab"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const SYNC_KEY = 'englishPlanSyncCode_v1';
function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s.slice(0,3) + '-' + s.slice(3);
}
let syncCode = localStorage.getItem(SYNC_KEY);
if(!syncCode){ syncCode = genCode(); localStorage.setItem(SYNC_KEY, syncCode); }
let syncStatus = 'checking';

async function pullFromCloud(){
  try{
    const ref = doc(db, 'progress', syncCode);
    const snap = await getDoc(ref);
    if(snap.exists()){
      const data = snap.data();
      if(data && data.progress){ progress = data.progress; saveProgress(progress); }
    } else {
      await pushToCloud();
    }
    syncStatus = 'ok';
  }catch(e){ syncStatus = 'offline'; }
}
async function pushToCloud(){
  try{
    const ref = doc(db, 'progress', syncCode);
    await setDoc(ref, { progress, updatedAt: Date.now() });
    syncStatus = 'ok';
  }catch(e){ syncStatus = 'offline'; }
}
async function linkCode(newCode){
  newCode = newCode.trim().toUpperCase();
  if(!newCode) return;
  localStorage.setItem(SYNC_KEY, newCode);
  syncCode = newCode;
  syncStatus = 'checking';
  render();
  await pullFromCloud();
  render();
}

ema di oggi o su un tema affine. Ascoltalo una volta per capirlo. Poi riproducilo e ripeti AD ALTA VOCE il piu' possibile in simultanea con l'audio (shadowing), imitando ritmo e intonazione, non solo le parole. Non preoccuparti se all'inizio non riesci a stare al passo: e' normale ed e' proprio quella difficolta' che allena fluidita' e pronuncia.\n\nQuesto esercizio prepara direttamente la conversazione su Praktika che segue.\n\nFonte: BBC Learning English - 6 Minute English: bbc.co.uk/learningenglish (nuovo episodio ogni giovedi', piu' archivio 'English Rewind')"}, {"tag": "Speaking · Praktika", "title": "Racconta la tua giornata tipo, dal risveglio alla sera. Usa almeno 3 chunk di questa settimana.", "body": "Apri Praktika e fai UNA SOLA conversazione concentrata e continua di 40-45 minuti (non interromperla per cambiare argomento - la pratica concentrata su un solo tema costruisce piu' fluidita').\n\nTema di oggi:\nRacconta la tua giornata tipo, dal risveglio alla sera. Usa almeno 3 chunk di questa settimana.\n\nIl vocabolario e lo shadowing di poco fa dovrebbero aiutarti ad avere le parole gia' 'calde' per questo tema."}, {"tag": "Lettura", "title": "Testo British Council su 'Vita quotidiana e abitudini'", "body": "Vai su British Council LearnEnglish, sezione Reading, e scegli un testo al tuo livello (B1 se vuoi restare sul sicuro, B2 se ti senti pronto per una sfida), possibilmente legato al tema 'Vita quotidiana e abitudini'. Leggi con calma, poi fai l'esercizio di comprensione automatico incluso nella pagina.\n\nFonte: British Council LearnEnglish - Reading B1/B2: learnenglish.britishcouncil.org/free-resources/reading\n\nNota: la lettura estensiva regolare e' una delle attivita' con il supporto scientifico piu' solido per il miglioramento linguistico complessivo (meta-analisi Nakanishi 2015, TESOL Quarterly)."}, {"tag": "Ascolto", "title": "Nuovo episodio BBC 6 Minute English (comprensione)", "body": "Ascolta un nuovo episodio di BBC 6 Minute English (quello EFR). Correggi e reinvia se il punteggio e' basso. Annota nel tuo log personale gli errori che si ripetono da una settimana all'altra: sono quelli su cui vale la pena concentrarsi di piu'."}]}, {"date": "2026-07-28", "week": 4, "week_title": "Forma passiva e phrasal verbs", "is_review_day": false, "tasks": [{"tag": "Grammatica", "title": "Passive voice + phrasal verbs comuni", "body": "RETRIEVAL WARM-UP (2 min): prima di leggere, prova a ricordare a voce alta la regola di IERI, senza guardare gli appunti.\n\nOggi: Passive voice + phrasal verbs comuni\nLa forma passiva sposta l'attenzione dall'azione a chi/cosa la subisce: utile per notizie, spiegazioni, processi. Phrasal verbs con get, take, put, come, go sono tra i piu' usati nel parlato naturale.\n- The report was written by the team last week.\n- This process is used in many factories.\n- I need to get over this cold before the trip. / Can you put up with the noise?\n\nFonte con esercizi auto-correggibili: British Council LearnEnglish - Grammar B1-B2: learnenglish.britishcouncil.org/free-resources/grammar/b1-b2"}, {"tag": "Vocabolario", "title": "8 chunk (retrieval practice)", "body": "RETRIEVAL PRACTICE: copri la traduzione/definizione di ogni chunk e prova a ricordarla PRIMA di guardare. Solo dopo aver provato, controlla. Rileggere senza autotestarsi ha un effetto quasi nullo sulla memoria a lungo termine.\n\nChunk di oggi: to get over (something), to put up with, to come up with, to take after (someone), to go through (an experience), to put off (postpone), to get along with, to take up (a hobby)\n\nPriorita': controlla quali di queste parole/chunk rientrano tra le 3000 piu' frequenti dell'inglese (Oxford 3000 (lista ufficiale gratuita): oxfordlearnersdictionaries.com/external/pdf/wordlists/oxford-3000-5000) - concentra lo sforzo extra su quelle, coprono circa il 95% dell'inglese parlato comune.\n\nAltro vocabolario per livello: British Council LearnEnglish - Vocabulary B1-B2: learnenglish.britishcouncil.org/free-resources/vocabulary/b1-b2"}, {"tag": "Shadowing", "title": "Ripeti ad alta voce sopra un audio BBC (prepara lo speaking)", "body": "Scegli un episodio breve (5-6 min) di BBC 6 Minute English sul tema di oggi o su un tema affine. Ascoltalo una volta per capirlo. Poi riproducilo e ripeti AD ALTA VOCE il piu' possibile in simultanea con l'audio (shadowing), imitando ritmo e intonazione, non solo le parole. Non preoccuparti se all'inizio non riesci a stare al passo: e' normale ed e' proprio quella difficolta' che allena fluidita' e pronuncia.\n\nQuesto esercizio prepara direttamente la conversazione su Praktika che segue.\n\nFonte: BBC Learning English - 6 Minute English: bbc.co.uk/learningenglish (nuovo episodio ogni giovedi', piu' archivio 'English Rewind')"}, {"tag": "Speaking · Praktika", "title": "Discuti: la tecnologia ci semplifica o complica la vita? Porta esempi.", "body": "Apri Praktika e fai UNA SOLA conversazione concentrata e continua di 40-45 minuti (non interromperla per cambiare argomento - la pratica concentrata su un solo tema costruisce piu' fluidita').\n\nTema di oggi:\nDiscuti: la tecnologia ci semplifica o complica la vita? Porta esempi.\n\nIl vocabolario e lo shadowing di poco fa dovrebbero aiutarti ad avere le parole gia' 'calde' per questo tema."}, {"tag": "Lettura", "title": "Testo British Council su 'Forma passiva e phrasal verbs'", "body": "Vai su British Council LearnEnglish, sezione Reading, e scegli un testo al tuo livello (B1 se vuoi restare sul sicuro, B2 se ti senti pronto per una sfida), possibilmente legato al tema 'Forma passiva e phrasal verbs'. Leggi con calma, poi fai l'esercizio di comprensione automatico incluso nella pagina.\n\nFonte: British Council LearnEnglish - Reading B1/B2: learnenglish.britishcouncil.org/free-resources/reading\n\nNota: la lettura estensiva regolare e' una delle attivita' con il supporto scientifico piu' solido per il miglioramento linguistico complessivo (meta-analisi Nakanishi 2015, TESOL Quarterly opo l'ascolto, riassumi a voce alta cosa hai capito in 3-4 frasi, senza guardare la trascrizione.\n\nFonte: BBC Learning English - 6 Minute English: bbc.co.uk/learningenglish (nuovo episodio ogni giovedi', piu' archivio 'English Rewind')"}, {"tag": "Scrittura + correzione", "title": "Scrivi 5 frasi sulla tua carriera ideale nei prossimi 5 anni.", "body": "Vai su Write & Improve by Cambridge (Write & Improve by Cambridge (gratuito): writeandimprove.com), lo strumento GRATUITO di correzione automatica sviluppato dalla University of Cambridge. Puoi scegliere un task tra quelli proposti dal sito al tuo livello, oppure scrivere liberamente seguendo questa traccia:\n\nScrivi 5 frasi sulla tua carriera ideale nei prossimi 5 anni.\n\nScrivi, invia, e leggi SUBITO il feedback automatico (grammatica, vocabolario, stile, punteggio CEFR). Correggi e reinvia se il punteggio e' basso. Annota nel tuo log personale gli errori che si ripetono da una settimana all'altra: sono quelli su cui vale la pena concentrarsi di piu'."}]}, {"date": "2026-08-11", "week": 6, "week_title": "Lavoro e carriera", "is_review_day": false, "tasks": [{"tag": "Grammatica", "title": "Modali di deduzione (must/might/could/can't have)", "body": "RETRIEVAL WARM-UP (2 min): prima di leggere, prova a ricordare a voce alta la regola di IERI, senza guardare gli appunti.\n\nOggi: Modali di deduzione (must/might/could/can't have)\nUsiamo i modali + have + participio passato per fare deduzioni su eventi passati: must have (certezza), might/could have (possibilita'), can't have (impossibilita').\n- He must have left early; his car isn't here.\n- She might have forgotten about the meeting.\n- They can't have finished already, it's too soon.\n\nFonte con esercizi auto-correggibili: British Council LearnEnglish - Grammar B1-B2: learnenglish.britishcouncil.org/free-resources/grammar/b1-b2"}, {"tag": "Vocabolario", "title": "8 chunk (retrieval practice)", "body": "RETRIEVAL PRACTICE: copri la traduzione/definizione di ogn gni giovedi', piu' archivio 'English Rewind')"}, {"tag": "Scrittura + correzione", "title": "Fai un mock writing test a tempo (20 min, tema libero).", "body": "Vai su Write & Improve by Cambridge (Write & Improve by Cambridge (gratuito): writeandimprove.com), lo strumento GRATUITO di correzione automatica sviluppato dalla University of Cambridge. Puoi scegliere un task tra quelli proposti dal sito al tuo livello, oppure scrivere liberamente seguendo questa traccia:\n\nFai un mock writing test a tempo (20 min, tema libero).\n\nScrivi, invia, e leggi SUBITO il feedback automatico (grammatica, vocabolario, stile, punteggio CEFR). Correggi e reinvia se il punteggio e' basso. Annota nel tuo log personale gli errori che si ripetono da una settimana all'altra: sono quelli su cui vale la pena concentrarsi di piu'."}]}, {"date": "2026-09-21", "week": 12, "week_title": "Consolidamento finale e mock exam", "is_review_day": false, "tasks": [{"tag": "Grammatica", "title": "Ripasso generale + simulazione esame B2", "body": "RETRIEVAL WARM-UP (2 min): prima di leggere, prova a ricordare a voce alta la regola di IERI, senza guardare gli appunti.\n\nOggi: Ripasso generale + simulazione esame B2\nUltima settimana: niente contenuti nuovi, solo consolidamento. Rivedi tutti i punti grammaticali delle 11 settimane precedenti e fai un mock test B2 completo (Cambridge English, EF SET o simili, gratuiti online).\n- Rivedi la lista completa degli errori annotati nelle 12 settimane.\n- Fai particolare attenzione ai punti che ti creano ancora dubbi.\n- Simula le condizioni d'esame: tempo limitato, senza pause.\n\nFonte con esercizi auto-correggibili: British Council LearnEnglish - Grammar B1-B2: learnenglish.britishcouncil.org/free-resources/grammar/b1-b2"}, {"tag": "Vocabolario", "title": "8 chunk (retrieval practice)", "body": "RETRIEVAL PRACTICE: copri la traduzione/definizione di ogni chunk e prova a ricordarla PRIMA di guardare. Solo dopo aver provato, controlla. Rileggere senza autotestarsi ha un effetto quasi nullo sulla memoria a lungo termine.\n\nChunk di oggi: to sum up, all things considered, to come to terms with, a step in the right direction, to look back with pride, there's room for improvement, to build on (something), moving forward\n\nPriorita': controlla quali di queste parole/chunk rientrano tra le 3000 piu' frequenti dell'inglese (Oxford 3000 (lista ufficiale gratuita): oxfordlearnersdictionaries.com/external/pdf/wordlists/oxford-3000-5000) - concentra lo sforzo extra su quelle, coprono circa il 95% dell'inglese parlato comune.\n\nAltro vocabolario per livello: British Council LearnEnglish - Vocabulary B1-B2: learnenglish.britishcouncil.org/free-resources/vocabulary/b1-b2"}, {"tag": "Shadowing", "title": "Ripeti ad alta voce sopra un audio BBC (prepara lo speaking)", "body": "Scegli un episodio breve (5-6 min) di BBC 6 Minute English sul tema di oggi o su un tema affine. Ascoltalo una volta per capirlo. Poi riproducilo e ripeti AD ALTA VOCE il piu' possibile in simultanea con l'audio (shadowing), imitando ritmo e intonazione, non solo le parole. Non preoccuparti se all'inizio non riesci a stare al passo: e' normale ed e' proprio quella difficolta' che allena fluidita' e pronuncia.\n\nQuesto esercizio prepara direttamente la conversazione su Praktika che segue.\n\nFonte: BBC Learning English - 6 Minute English: bbc.co.uk/learningenglish (nuovo episodio ogni giovedi', piu' archivio 'English Rewind')"}, {"tag": "Speaking · Praktika", "title": "Conversazione libera su un tema complesso (es. tecnologia e societa').", "body": "Apri Praktika e fai UNA SOLA conversazione concentrata e continua di 40-45 minuti (non interromperla per cambiare argomento - la pratica concentrata su un solo tema costruisce piu' fluidita').\n\nTema di oggi:\nConversazione libera su un tema complesso (es. tecnologia e societa').\n\nIl vocabolario e lo shadowing di poco fa dovrebbero aiutarti ad avere le parole gia' 'calde' per questo tema."}, {"tag": "Lettura", "ti itishcouncil.org/free-resources/grammar/b1-b2"}, {"tag": "Vocabolario", "title": "Ripasso misto vocabolario", "body": "REVISIONE MISTA: oggi rimescola le flashcard/chunk di TUTTE le settimane precedenti (non solo quelli recenti). Fai un giro di retrieval practice (copri e ricorda) su un campione ampio, scelto a caso, del vocabolario visto finora.\n\nRiferimento: British Council LearnEnglish - Vocabulary B1-B2: learnenglish.britishcouncil.org/free-resources/vocabulary/b1-b2"}, {"tag": "Shadowing", "title": "Ripeti ad alta voce sopra un audio BBC (prepara lo speaking)", "body": "Scegli un episodio breve (5-6 min) di BBC 6 Minute English sul tema di oggi o su un tema affine. Ascoltalo una volta per capirlo. Poi riproducilo e ripeti AD ALTA VOCE il piu' possibile in simultanea con l'audio (shadowing), imitando ritmo e intonazione, non solo le parole. Non preoccuparti se all'inizio non riesci a stare al passo: e' normale ed e' proprio quella difficolta' che allena fluidita' e pronuncia.\n\nQuesto esercizio prepara direttamente la conversazione su Praktika che segue.\n\nFonte: BBC Learning English - 6 Minute English: bbc.co.uk/learningenglish (nuovo episodio ogni giovedi', piu' archivio 'English Rewind')"}, {"tag": "Speaking · Praktika", "title": "Conversazione finale libera di 20+ min, riassumendo il percorso fatto.", "body": "Apri Praktika e fai UNA SOLA conversazione concentrata e continua di 40-45 minuti (non interromperla per cambiare argomento - la pratica concentrata su un solo tema costruisce piu' fluidita').\n\nTema di oggi:\nConversazione finale libera di 20+ min, riassumendo il percorso fatto.\n\nIl vocabolario e lo shadowing di poco fa dovrebbero aiutarti ad avere le parole gia' 'calde' per questo tema."}, {"tag": "Lettura", "title": "Testo British Council su 'Consolidamento finale e mock exam'", "body": "Vai su British Council LearnEnglish, sezione Reading, e scegli un testo al tuo livello (B1 se vuoi restare sul sicuro, B2 se ti senti pronto per una sfida), possibilmente legato al tema 'Consolidamento finale e mock exam'. Leggi con calma, poi fai l'esercizio di comprensione automatico incluso nella pagina.\n\nFonte: British Council LearnEnglish - Reading B1/B2: learnenglish.britishcouncil.org/free-resources/reading\n\nNota: la lettura estensiva regolare e' una delle attivita' con il supporto scientifico piu' solido per il miglioramento linguistico complessivo (meta-analisi Nakanishi 2015, TESOL Quarterly)."}, {"tag": "Ascolto", "title": "Nuovo episodio BBC 6 Minute English (comprensione)", "body": "Ascolta un nuovo episodio di BBC 6 Minute English (quello piu' recente, o uno dall'archivio 'English Rewind' se preferisci un tema specifico). Stavolta l'obiettivo e' la comprensione completa, non la pronuncia (quella l'hai gia' allenata stamattina con lo shadowing). Dopo l'ascolto, riassumi a voce alta cosa hai capito in 3-4 frasi, senza guardare la trascrizione.\n\nFonte: BBC Learning English - 6 Minute English: bbc.co.uk/learningenglish (nuovo episodio ogni giovedi', piu' archivio 'English Rewind')"}, {"tag": "Scrittura + correzione", "title": "Scrivi il tuo piano per i prossimi 3 mesi dopo il B2.", "body": "Vai su Write & Improve by Cambridge (Write & Improve by Cambridge (gratuito): writeandimprove.com), lo strumento GRATUITO di correzione automatica sviluppato dalla University of Cambridge. Puoi scegliere un task tra quelli proposti dal sito al tuo livello, oppure scrivere liberamente seguendo questa traccia:\n\nScrivi il tuo piano per i prossimi 3 mesi dopo il B2.\n\nScrivi, invia, e leggi SUBITO il feedback automatico (grammatica, vocabolario, stile, punteggio CEFR). Correggi e reinvia se il punteggio e' basso. Annota nel tuo log personale gli errori che si ripetono da una settimana all'altra: sono quelli su cui vale la pena concentrarsi di piu'."}]}];
const SLOT_TIMES = ["09:30","09:45","10:00","10:15","12:00","16:00","18:30"];
const TOTAL = SESSIONS.length;
const TOTAL_TASKS = TOTAL * 7;

const STORAGE_KEY = 'englishPlanProgressFinal_v1';
let PERSIST_OK = true;
let MEM_STORE = {};
try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); }catch(e){ PERSIST_OK = false; }

function loadProgress(){
  if(!PERSIST_OK) return MEM_STORE;
  try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }catch(e){ return {}; }
}
function saveProgress(p){
  if(!PERSIST_OK){ MEM_STORE = p; return; }
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }catch(e){}
}

function fmtDate(iso){
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString('it-IT', {weekday:'short', day:'numeric', month:'short'});
}

let progress = loadProgress();
function ensure(idx){ if(!progress[idx]) progress[idx] = new Array(7).fill(false); return progress[idx]; }
function isDone(idx){ const p = progress[idx]; return p && p.every(x=>x); }

function nominalIndex(){
  const today = new Date(); today.setHours(0,0,0,0);
  let idx = 0;
  for(let i=0;i<SESSIONS.length;i++){
    const sd = new Date(SESSIONS[i].date + "T00:00:00"); sd.setHours(0,0,0,0);
    if(sd <= today) idx = i; else break;
  }
  return idx;
}
function firstIncompleteIndex(){
  for(let i=0;i<SESSIONS.length;i++){ if(!isDone(i)) return i; }
  return SESSIONS.length - 1;
}

let currentIndex = null;

function render(){
  const app = document.getElementById('app');
  const nomIdx = nominalIndex();
  const catchUpIdx = firstIncompleteIndex();
  if(currentIndex === null) currentIndex = catchUpIdx;

  const idx = currentIndex;
  const session = SESSIONS[idx];
  const prog = ensure(idx);

  const doneSessions = SESSIONS.reduce((acc,_,i)=> acc + (isDone(i)?1:0), 0);
  const doneTasks = Object.values(progress).reduce((acc,p)=> acc + p.filter(Boolean).length, 0);
  const pct = Math.round((doneTasks / TOTAL_TASKS) * 100);

  const isBehind = catchUpIdx < nomIdx;
  const isPastEnd = nomIdx === TOTAL-1 && new Date() > new Date(SESSIONS[TOTAL-1].date + "T00:00:00").getTime()+7*86400000 && doneSessions < TOTAL;

  let banner = '';
  if(isPastEnd){
    banner = `<div class="banner">La scadenza originale è passata, ma il piano non si blocca: hai ancora <b>${TOTAL - doneSessions} sessioni</b> da recuperare. Continua con calma da dove eri rimasto.</div>`;
  } else if(isBehind){
    banner = `<div class="banner">Sei un po' indietro: oggi saresti al giorno <b>${nomIdx+1}</b>, ma l'ultima sessione non completata è la <b>${catchUpIdx+1}</b>. Recupera con i tuoi tempi.</div>`;
  }
  if(session.is_review_day){
    banner += `<div class="review-banner">Oggi è un giorno di REVISIONE MISTA (interleaving): grammatica e vocabolario mescolano le settimane precedenti invece di introdurre cose nuove — è il momento in cui la ricerca mostra i benefici più forti per la memoria a lungo termine.</div>`;
  }

  const railSegs = SESSIONS.map((s,i)=>{
    const done = isDone(i);
    let cls = '';
    if(i===idx) cls = 'current';
    else if(done) cls = 'done';
    else if(s.is_review_day) cls = 'review';
    else if(i < nomIdx) cls = 'missed';
    return `<div class="seg ${cls}"></div>`;
  }).join('');

  const tasksHtml = session.tasks.map((t,i)=>{
    const on = prog[i];
    return `
    <div class="task" data-i="${i}">
      <div class="task-head" onclick="toggleOpen(${i})">
        <div class="check ${on?'on':''}" onclick="event.stopPropagation(); toggleDone(${i})">${on?'✓':''}</div>
        <div class="task-label">
          <div class="task-tag">${t.tag} <span class="time">${SLOT_TIMES[i]}</span></div>
          <div class="task-title ${on?'done':''}">${t.title}</div>
        </div>
        <div class="chev">▾</div>
      </div>
      <div class="task-body">${t.body}</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="top">
      <div class="brand">Piano Inglese · B1 → B2</div>
      <div class="datebadge">${fmtDate(session.date)}</div>
    </div>
    <h1>Settimana ${session.week} — ${session.week_title}</h1>
    <div class="sub">Giorno ${idx+1} di ${TOTAL} · ~2h50/giorno</div>
    ${banner}
    <div class="stats">
      <div class="stat"><div class="n">${pct}%</div><div class="l">Completato</div></div>
      <div class="stat"><div class="n">${doneSessions}/${TOTAL}</div><div class="l">Giorni finiti</div></div>
      <div class="stat"><div class="n">${TOTAL - doneSessions}</div><div class="l">Rimasti</div></div>
    </div>
    <div class="rail">${railSegs}</div>

    <div class="card">
      <div class="card-head">
        <div class="eyebrow">Attività di oggi (in ordine)</div>
        <div class="navbtns">
          <button class="navbtn" ${idx===0?'disabled':''} onclick="goTo(${idx-1})">← Prec.</button>
          <button class="navbtn ${idx===catchUpIdx?'hi':''}" onclick="goTo(${catchUpIdx})">Da fare</button>
          <button class="navbtn ${idx===nomIdx?'hi':''}" onclick="goTo(${nomIdx})">Oggi (cal.)</button>
          <button class="navbtn" ${idx===TOTAL-1?'disabled':''} onclick="goTo(${idx+1})">Succ. →</button>
        </div>
      </div>
      ${tasksHtml}
    </div>

    <div class="legend">
      <span><span class="dot" style="background:var(--teal)"></span>completato</span>
      <span><span class="dot" style="background:var(--gold)"></span>oggi</span>
      <span><span class="dot" style="background:#7a6bc4"></span>revisione mista</span>
      <span><span class="dot" style="background:var(--coral)"></span>saltato</span>
    </div>

    ${!PERSIST_OK ? '<div class="persist-warn">Il tuo browser non salva i progressi in modo permanente qui: apri sempre lo stesso file/scheda senza cancellare i dati di navigazione.</div>' : ''}

    <div class="sync-panel">
      <div class="sync-row">
        <span class="sync-dot ${syncStatus}"></span>
        <span class="sync-label">${syncStatus==='ok' ? 'Sincronizzato' : (syncStatus==='offline' ? 'Non sincronizzato (offline)' : 'Sincronizzazione...')}</span>
        <span class="sync-code" onclick="copyCode()">${syncCode}</span>
      </div>
      <div class="sync-hint">Usa questo codice su un altro dispositivo per vedere qui gli stessi progressi.</div>
      <div class="sync-link-row">
        <input id="linkInput" class="sync-input" placeholder="Incolla un altro codice (es. ABC-123)">
        <button class="navbtn" onclick="linkCode(document.getElementById('linkInput').value)">Collega</button>
      </div>
    </div>
  `;
}
window.copyCode = function(){
  navigator.clipboard?.writeText(syncCode).catch(()=>{});
};

function toggleOpen(i){
  const el = document.querySelectorAll('.task')[i];
  const body = el.querySelector('.task-body');
  const isOpen = el.classList.contains('open');
  if(isOpen){ el.classList.remove('open'); body.style.maxHeight = null; }
  else{ el.classList.add('open'); body.style.maxHeight = body.scrollHeight + 'px'; }
}
function toggleDone(i){
  const p = ensure(currentIndex);
  p[i] = !p[i];
  saveProgress(progress);
  render();
  pushToCloud().then(render);
}
function goTo(i){
  if(i<0 || i>=SESSIONS.length) return;
  currentIndex = i;
  render();
}

window.toggleOpen = toggleOpen;
window.toggleDone = toggleDone;
window.goTo = goTo;
window.linkCode = linkCode;

render();
pullFromCloud().then(render);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
