<style>
  :root{
    --bg: #101a22; --bg-2: #16232d; --card: #1b2934; --card-2: #223240;
    --line: #2b3d4a; --ink: #eee7da; --ink-dim: #93a6b0;
    --gold: #c9a227; --gold-soft: #e3c568; --teal: #5fa38c; --coral: #c1694f;
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 800px at 10% -10%, #17262f 0%, var(--bg) 55%);

  .wrap{max-width:720px; margin:0 auto; padding:24px 16px;}
  .top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .brand{font-family:'Fraunces',serif; font-weight:600; font-size:14px; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-soft);}
  .datebadge{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-dim);}

  .review-banner{background:rgba(201,162,39,0.12); border:1px solid rgba(201,162,39,0.4); color:var(--gold-soft); border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner{background: rgba(193,105,79,0.12); border:1px solid rgba(193,105,79,0.4); color:#e8b6a5; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:14px;}
  .banner b{color:#f0c9bc;}

  .stats{display:flex; gap:10px; margin-bottom:14px;}
  .stat{flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 12px;}
  .stat .n{font-family:'Fraunces',serif; font-size:20px; font-weight:600; color:var(--gold-soft);}
  .stat .l{font-size:10.5px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-top:2px;}

  .rail{display:flex; gap:3px; margin:12px 0 16px 0;}
  .rail .seg{flex:1; height:6px; border-radius:3px; background:var(--line);}
  .rail .seg.done{background:var(--teal);}
  .rail .seg.current{background:var(--gold);}
  .rail .seg.missed{background:var(--coral); opacity:.55;}
  .rail .seg.review{background:#7a6bc4;}

  .card{background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:14px;}
  .card-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:2px; flex-wrap:wrap;}
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.06em; color:var(--gold-soft); text-transform:uppercase;}

  .navbtns{display:flex; gap:6px; flex-wrap:wrap;}
  .navbtn{background:var(--bg-2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:7px 11px; font-size:12px; cursor:pointer; font-family:'Inter';}
  .navbtn:hover{border-color:var(--gold);}
  .navbtn:disabled{opacity:.3; cursor:not-allowed;}
  .navbtn.hi{border-color:var(--gold); color:var(--gold-soft);}

  .task{border:1px solid var(--line); border-radius:10px; margin-top:10px; overflow:hidden; background:rgba(255,255,255,.015);}
  .task-head{display:flex; align-items:flex-start; gap:12px; padding:12px 14px; cursor:pointer;}
  .check{width:21px; height:21px; border-radius:6px; border:1.5px solid var(--ink-dim); flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--bg); transition:all .15s ease;}
  .check.on{background:var(--teal); border-color:var(--teal); color:#0d1a16;}
  .task-label{flex:1;}
  .task-tag{font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase; color:var(--gold-soft);}
  .task-title{font-size:14px; margin-top:2px;}
  .task-title.done{color:var(--ink-dim); text-decoration:line-through; text-decoration-color:var(--line);}
  .chev{color:var(--ink-dim); font-size:12px; margin-top:4px; transition:transform .15s ease;}
  .task.open .chev{transform:rotate(180deg);}
  .task-body{max-height:0; overflow:hidden; transition:max-height .3s ease; padding:0 14px; font-size:13px; line-height:1.6; color:var(--ink-dim); white-space:pre-line;}
  .task.open .task-body{padding:0 14px 14px 14px;}
  .time{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-dim); margin-left:6px;}

  .persist-warn{font-size:12px; color:var(--coral); text-align:center; margin-top:10px;}

  .sync-panel{background:var(--bg-2); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:18px;}
  .sync-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .sync-dot{width:8px; height:8px; border-radius:50%; background:var(--ink-dim); flex-shrink:0;}
  .sync-dot.ok{background:var(--teal);}
  .sync-dot.offline{background:var(--coral);}
  .sync-dot.checking{background:var(--gold); animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.3;}}
  .sync-label{font-size:12.5px; color:var(--ink-dim); flex:1;}
  .sync-code{font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--gold-soft); background:var(--card); border:1px solid var(--line); border-radius:6px; padding:4px 9px; cursor:pointer; letter-spacing:.05em;}
  .sync-hint{font-size:11.5px; color:var(--ink-dim); margin-top:8px;}
  .sync-link-row{display:flex; gap:8px; margin-top:10px;}
  .sync-input{flex:1; background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 10px; font-family:'JetBrains Mono',monospace; font-size:12.5px;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:11px; color:var(--ink-dim); margin-top:16px;}
  .legend span{display:flex; align-items:center; gap:5px;}
  .dot{width:8px; height:8px; border-radius:2px; display:inline-block;}

  .main-nav{display:flex; gap:8px; margin-bottom:18px; border-bottom:1px solid var(--line); padding-bottom:0; overflow-x:auto; -webkit-overflow-scrolling:touch; white-space:nowrap;}
  .main-nav button{background:none; border:none; color:var(--ink-dim); font-family:'Inter'; font-weight:600; font-size:13.5px; padding:10px 4px; cursor:pointer; border-bottom:2px solid transparent; margin-right:14px;}
  .main-nav button.active{color:var(--gold-soft); border-bottom-color:var(--gold);}

  .task-body a{color:var(--gold-soft);}
  .task-link-btn{display:flex; align-items:center; gap:6px; margin-top:14px; padding:11px 14px; background:var(--bg-2); border:1px solid var(--gold-soft); border-radius:10px; color:var(--gold-soft) !important; font-family:'Inter'; font-weight:600; font-size:13px; text-decoration:none; width:fit-content;}
  .task-link-btn:active{background:var(--card-2);}

  .vocab-subnav{display:flex; gap:8px; margin-bottom:16px;}
  .vocab-subnav button{flex:1; background:var(--card); border:1px solid var(--line); color:var(--ink-dim); border-radius:9px; padding:9px; font-size:12.5px; font-family:'Inter'; cursor:pointer;}
  .vocab-subnav button.active{background:var(--card-2); color:var(--gold-soft); border-color:var(--gold);}

  .vocab-filters{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .level-chip{background:var(--bg-2); border:1px solid var(--line); color:var(--ink-dim); border-radius:20px; padding:6px 13px; font-size:12px; cursor:pointer; font-family:'JetBrains Mono',monospace;}
  .level-chip.active{background:var(--gold); border-color:var(--gold); color:#1c1404; font-weight:600;}
  .vocab-search{width:100%; background:var(--bg-2); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:11px 14px; font-size:14px; margin-bottom:14px; font-family:'Inter';}

  .word-list{display:flex; flex-direction:column; gap:6px; max-height:60vh; overflow-y:auto;}
  .word-row{display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--line); border-radius:8px; padding:10px 14px;}
  .word-name{font-size:14.5px;}
  .level-badge{font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:3px 8px; border-radius:10px; letter-spacing:.03em;}
  .level-badge.A1{background:rgba(95,163,140,.18); color:var(--teal);}
  .level-badge.A2{background:rgba(95,163,140,.3); color:var(--teal);}
  .level-badge.B1{background:rgba(201,162,39,.18); color:var(--gold-soft);}
  .level-badge.B2{background:rgba(193,105,79,.22); color:#e8a58c;}
  .word-count{font-size:12px; color:var(--ink-dim); margin-bottom:10px;}

  .quiz-card{background:linear-gradient(180deg,var(--card),var(--card-2)); border:1px solid var(--line); border-radius:var(--radius); padding:36px 24px; text-align:center; min-height:220px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;}
  .quiz-word{font-family:'Fraunces',serif; font-size:34px; font-weight:600; word-break:break-word; text-align:center; line-height:1.2;}
  .quiz-meta{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--ink-dim);}
  .quiz-reveal{color:var(--ink-dim); font-size:13px; cursor:pointer; text-decoration:underline; text-decoration-style:dotted;}
  .quiz-actions{display:flex; gap:10px; width:100%; margin-top:8px;}
  .quiz-btn{flex:1; padding:13px; border-radius:10px; border:none; font-weight:600; font-size:14px; cursor:pointer; font-family:'Inter';}
  .quiz-btn.no{background:rgba(193,105,79,.18); color:#e8a58c;}
  .quiz-btn.yes{background:rgba(95,163,140,.22); color:var(--teal);}
  .quiz-stats{display:flex; gap:10px; margin-bottom:14px;}

  .ex-sentence{font-size:16px; line-height:1.6; margin-bottom:20px;}
  .ex-blank{font-family:'JetBrains Mono',monospace; color:var(--gold-soft); border-bottom:2px solid var(--gold-soft); padding:0 4px;}
  .ex-options{display:flex; flex-direction:column; gap:9px;}
  .ex-option{background:var(--bg-2); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:12px 14px; text-align:left; font-size:14px; cursor:pointer; font-family:'Inter';}
  .ex-option.correct{background:rgba(95,163,140,.25); border-color:var(--teal);}
  .ex-option.wrong{background:rgba(193,105,79,.22); border-color:var(--coral);}
  .ex-next{margin-top:16px;}
  .ex-empty{text-align:center; color:var(--ink-dim); padding:40px 20px; font-size:14px;}

  .dash-section{margin-bottom:26px;}
  .dash-section-title{font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin-bottom:10px; color:var(--gold-soft);}
  .stat-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:10px;}
  .stat-card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px;}
  .stat-card .n{font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--gold-soft);}
  .stat-card .l{font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-top:3px;}

  .cal-scroll{overflow-x:auto; padding-bottom:6px;}
  .cal-grid{display:flex; gap:3px; width:max-content;}
  .cal-week{display:flex; flex-direction:column; gap:3px;}
  .cal-cell{width:13px; height:13px; border-radius:3px; background:var(--line);}
  .cal-cell.cal-empty{background:transparent;}
  .cal-cell.cal-rest{background:rgba(255,255,255,0.05);}
  .cal-cell.cal-level-1{background:rgba(95,163,140,.28);}
  .cal-cell.cal-level-2{background:rgba(95,163,140,.52);}
  .cal-cell.cal-level-3{background:rgba(95,163,140,.78);}
  .cal-cell.cal-level-4{background:var(--teal);}
  .cal-legend{display:flex; align-items:center; gap:5px; margin-top:8px; font-size:11px; color:var(--ink-dim);}

  .rhythm-grid{display:flex; gap:8px; align-items:flex-end; height:100px; margin-top:10px;}
  .rhythm-col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%;}
  .rhythm-bar{width:100%; background:linear-gradient(180deg, var(--gold-soft), var(--teal)); border-radius:5px 5px 2px 2px; min-height:3px;}
  .rhythm-label{font-size:10.5px; color:var(--ink-dim);}

  .dash-settings{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px;}
  .dash-settings label{display:block; font-size:12.5px; color:var(--ink-dim); margin-bottom:6px;}
  .dash-settings input[type=date]{background:var(--bg-2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:9px 12px; font-family:'JetBrains Mono',monospace; font-size:13px; width:100%; margin-bottom:10px;}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAf6YA-KJ9eohe7P5EtXPSZQCqOavsr4U8",
  authDomain: "piano-inglese.firebaseapp.com",
  projectId: "piano-inglese",
  storageBucket: "piano-inglese.firebasestorage.app",
  messagingSenderId: "34982813106",
  appId: "1:34982813106:web:bd597fe7c9d258057558ab"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const SYNC_KEY = 'englishPlanSyncCode_v1';
function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s.slice(0,3) + '-' + s.slice(3);
}
let syncCode = localStorage.getItem(SYNC_KEY);
if(!syncCode){ syncCode = genCode(); localStorage.setItem(SYNC_KEY, syncCode); }
let syncStatus = 'checking';

async function pullFromCloud(){
  try{
    const ref = doc(db, 'progress', syncCode);
    const snap = await getDoc(ref);
    if(snap.exists()){
      const data = snap.data();
      if(data && data.progress){ progress = data.progress; saveProgress(progress); }
      if(data && data.vocabProgress){ vocabProgress = data.vocabProgress; saveVocabProgress(); }
      if(data && data.phrasalProgress){ phrasalProgress = data.phrasalProgress; savePhrasalProgress(); }
      if(data && data.reviewItems){ reviewItems = data.reviewItems; saveReviewItems(); }
      if(data && data.planStartDate && typeof applyStartDateShift === 'function' && data.planStartDate !== planStartDate){
        planStartDate = data.planStartDate;
        applyStartDateShift(planStartDate);
        savePlanStartDateLocal();
      }
    } else {
      await pushToCloud();
    }
    syncStatus = 'ok';
  }catch(e){ syncStatus = 'offline'; }
}
async function pushToCloud(){
  try{
    const ref = doc(db, 'progress', syncCode);
    await setDoc(ref, { progress, vocabProgress, phrasalProgress, reviewItems, planStartDate, updatedAt: Date.now() });
    syncStatus = 'ok';
  }catch(e){ syncStatus = 'offline'; }
}
async function linkCode(newCode){
  newCode = newCode.trim().toUpperCase();
  if(!newCode) return;
  localStorage.setItem(SYNC_KEY, newCode);
  syncCode = newCode;
  syncStatus = 'checking';
  render();
  await pullFromCloud();
  render();
}

rasi, senza guardare la trascrizione.", "link": "https://www.bbc.co.uk/learningenglish", "link_label": "BBC Learning English – 6 Minute English"}, {"tag": "Scrittura + correzione", "title": "Scrivi una lettera immaginaria a te stesso tra un anno.", "body": "Vai su Write & Improve by Cambridge, lo strumento GRATUITO di correzione automatica sviluppato dalla University of Cambridge. Puoi scegliere un task tra quelli proposti dal sito al tuo livello, oppure scrivere liberamente seguendo questa traccia:\n\nScrivi una lettera immaginaria a te stesso tra un anno.\n\nScrivi, invia, e leggi SUBITO il feedback automatico (grammatica, vocabolario, stile, punteggio CEFR). Correggi e reinvia se il punteggio e' basso. Annota nel tuo log personale gli errori che si ripetono da una settimana all'altra: sono quelli su cui vale la pena concentrarsi di piu'.", "link": "https://writeandimprove.com", "link_label": "Write & Improve by Cambridge"}]}, {"date": "2026-07-22", "week": 3, "week_title": "Progetti futuri", "is_review_day": false, "tasks": [{"tag": "Grammatica", "title": "Future forms (will / going to / present continuous) + Condizionale 3", "body": "RETRIEVAL WARM-UP (2 min): prima di leggere, prova a ricordare a voce alta la regola di IERI, senza guardare gli appunti.\n\nOggi: Future forms (will / going to / present continuous) + Condizionale 3\nWill per decisioni spontanee/previsioni, going to per piani gia' decisi, present continuous per appuntamenti fissati. Condizionale 3: situazioni ipotetiche passate (non piu' modificabili).\n- I think it will rain later. / I'm going to study abroad next year.\n- I'm meeting a friend tomorrow at 6pm.\n- If I had studied harder, I would have passed the exam.", "link": "https://learnenglish.britishcouncil.org/free-resources/grammar/b1-b2", "link_label": "British Council – Grammar B1-B2 (esercizi auto-correggibili)"}, {"tag": "Vocabolario", "title": "8 chunk (retrieval practice)", "body": "RETRIEVAL PRACTICE: copri la traduzione/definizione function isDone(idx){ const p = progress[idx]; return p && p.every(x=>x); }

function nominalIndex(){
  const today = new Date(); today.setHours(0,0,0,0);
  let idx = 0;
  for(let i=0;i<SESSIONS.length;i++){
    const sd = new Date(SESSIONS[i].date + "T00:00:00"); sd.setHours(0,0,0,0);
    if(sd <= today) idx = i; else break;
  }
  return idx;
}
function firstIncompleteIndex(){
  for(let i=0;i<SESSIONS.length;i++){ if(!isDone(i)) return i; }
  return SESSIONS.length - 1;
}

let dictCache = loadDictCache();

async function fetchDefinition(word){
  if(dictCache[word]) return dictCache[word];
  try{
    const res = await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word));
    if(!res.ok) throw new Error('not found');
    const data = await res.json();
    const entry = data[0];
    const meaning = entry && entry.meanings && entry.meanings[0];
    const def = meaning && meaning.definitions && meaning.definitions[0];
    if(!def){ throw new Error('no definition'); }
    let text = def.definition;
    if(def.example){ text += ` — e.g. "${def.example}"`; }
    const pos = meaning.partOfSpeech ? `(${meaning.partOfSpeech}) ` : '';
    const result = pos + text;
    dictCache[word] = result;
    saveDictCache();
    return result;
  }catch(e){
    return null;
  }
}

const REVIEW_INTERVALS = [1, 3, 7, 14, 30]; // giorni per box 0..4, poi "imparata"

function todayStr(){ const d = new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); }
function addDaysStr(days){ const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }

function ensureReviewItem(type, word, builtinMeaning){
  const key = type + ':' + word;
  if(!reviewItems[key]){
    reviewItems[key] = { type, word, box: 0, nextReview: todayStr(), note: '', mastered: false, builtinMeaning: builtinMeaning || '' };
    saveReviewItems();
  }
  return key;
}
function scheduleReview(key, remembered){
  const item = reviewItems[key];
  if(!item) return;
  if(!remembered){
    item.box = 0;
    item.nextReview = addDaysStr(1);
    item.mastered = false;
  } else {
    item.box = (item.box||0) + 1;
    if(item.box >= REVIEW_INTERVALS.length){
      item.mastered = true;
      item.nextReview = null;
    } else {
      item.nextReview = addDaysStr(REVIEW_INTERVALS[item.box]);
    }
  }
  saveReviewItems();
  pushToCloud();
}
function computeDueList(){
  const today = todayStr();
  return Object.entries(reviewItems)
    .filter(([k,v]) => !v.mastered && v.nextReview && v.nextReview <= today)
    .map(([k,v]) => ({key:k, ...v}))
    .sort((a,b)=> a.nextReview.localeCompare(b.nextReview));
}
function computeUpcomingList(){
  const today = todayStr();
  return Object.entries(reviewItems)
    .filter(([k,v]) => !v.mastered && v.nextReview && v.nextReview > today)
    .map(([k,v]) => ({key:k, ...v}))
    .sort((a,b)=> a.nextReview.localeCompare(b.nextReview));
}
function computeMasteredList(){
  return Object.entries(reviewItems).filter(([k,v])=>v.mastered).map(([k,v])=>({key:k,...v}));
}



function linkify(text){
  return text.replace(/(https?:\/\/[^\s)]+)/g, '<a href="$1" target="_blank" rel="noopener">$1<\/a>');
}

function setupQuizPool(){
  if(quizPool.length) return;
  const pool = OXFORD_WORDS.filter(w => vocabLevelFilter==='ALL' ? (w.l==='B1'||w.l==='B2') : w.l===vocabLevelFilter);
  quizPool = pool.slice().sort(()=>Math.random()-0.5);
  quizPos = 0;
  quizRevealed = false;
}
function vocabQuizHtml(){
  if(!quizPool.length) setupQuizPool();
  if(quizPos >= quizPool.length){ quizPos = 0; }
  const w = quizPool[quizPos];
  if(!w) return `<div class="ex-empty">Nessuna parola disponibile per questo filtro.</div>`;
  let revealHtml;
  if(!quizRevealed){
    revealHtml = `<div class="quiz-reveal" onclick="revealQuiz()">Mostra significato</div>`;
  } else if(quizMeaning === 'loading'){
    revealHtml = `<div class="quiz-meta">Cerco il significato...</div>`;
  } else {
    revealHtml = `<div class="quiz-meta" style="max-width:300px;">${quizMeaning}</div>`;
  }
  return `
    <div class="quiz-stats">
      <div class="stat"><div class="n">${quizStats.known}</div><div class="l">La so</div></div>
      <div class="stat"><div class="n">${quizStats.unknown}</div><div class="l">Da rivedere</div></div>
      <div class="stat"><div class="n">${quizPos+1}/${quizPool.length}</div><div class="l">Posizione</div></div>
    </div>
    <div class="quiz-card">
      <div class="quiz-word">${w.w}</div>
      <div class="quiz-meta">${w.l} · ${w.ls.join('/')}</div>
      ${revealHtml}
      <div class="quiz-actions">
        <button class="quiz-btn no" onclick="answerQuiz(false)">Non la so</button>
        <button class="quiz-btn yes" onclick="answerQuiz(true)">La so</button>
      </div>
    </div>
  `;
}
window.revealQuiz = async function(){
  quizRevealed = true;
  quizMeaning = 'loading';
  render();
  const w = quizPool[quizPos];
  const def = await fetchDefinition(w.w);
  quizMeaning = def || 'Nessuna definizione trovata online per questa parola. Prova a ricordarla comunque prima di rispondere.';
  render();
};
window.answerQuiz = function(knewIt){
  const w = quizPool[quizPos];
  vocabProgress[w.w] = knewIt ? 'known' : 'unknown';
  saveVocabProgress();
  if(!knewIt){ ensureReviewItem('oxford', w.w, quizMeaning && quizMeaning !== 'loading' ? quizMeaning : ''); }
  pushToCloud();
  if(knewIt) quizStats.known++; else quizStats.unknown++;
  quizPos++;
  quizRevealed = false;
  quizMeaning = null;
  render();
};

function setupExPool(){
  if(exPool.length) return;
  exPool = Object.keys(EXERCISES).sort(()=>Math.random()-0.5);
  exPos = 0;
  exAnswered = null;
  exSelected = null;
}
function vocabExercisesHtml(){
  if(!exPool.length) setupExPool();
  const total = exPool.length;
  if(!total) return `<div class="ex-empty">Esercizi in arrivo per altre parole nei prossimi aggiornamenti.</div>`;
  if(exPos >= total) exPos = 0;
  const word = exPool[exPos];
  const ex = EXERCISES[word];
  if(!ex._shuffled){ ex._shuffled = [ex.answer, ...ex.distractors].sort(()=>Math.random()-0.5); }
  const optsHtml = ex._shuffled.map(opt=>{
    let cls = '';
    if(exAnswered){
      if(opt === ex.answer) cls = 'correct';
      else if(opt === exSelected && opt !== ex.answer) cls = 'wrong';
    }
    const safeOpt = opt.replace(/'/g, "\\'");
    return `<button class="ex-option ${cls}" onclick="answerEx('${safeOpt}')" ${exAnswered?'disabled':''}>${opt}</button>`;
  }).join('');
  return `
    <div class="word-count">Esercizio ${exPos+1} di ${total} (copertura in crescita — altre parole nei prossimi aggiornamenti)</div>
    <div class="ex-sentence">${ex.sentence.replace('___', '<span class="ex-blank">______</span>')}</div>
    <div class="ex-options">${optsHtml}</div>
    ${exAnswered ? `<button class="navbtn ex-next" onclick="nextEx()">Prossimo →</button>` : ''}
  `;
}
window.answerEx = function(opt){
  if(exAnswered) return;
  exSelected = opt;
  exAnswered = true;
  render();
};
window.nextEx = function(){
  exPos++;
  exAnswered = null;
  exSelected = null;
  render();
};

    </div>
  `;
}
window.revealPhrasalQuiz = function(){ phrasalQuizRevealed = true; render(); };
window.answerPhrasalQuiz = function(knewIt){
  const w = phrasalQuizPool[phrasalQuizPos];
  phrasalProgress[w.w] = knewIt ? 'known' : 'unknown';
  savePhrasalProgress();
  if(!knewIt){ ensureReviewItem('phrasal', w.w, w.m); }
  pushToCloud();
  if(knewIt) phrasalQuizStats.known++; else phrasalQuizStats.unknown++;
  phrasalQuizPos++;
  phrasalQuizRevealed = false;
  render();
};

function setupPhrasalExPool(){
  if(phrasalExPool.length) return;
  phrasalExPool = Object.keys(PHRASAL_EXERCISES).sort(()=>Math.random()-0.5);
  phrasalExPos = 0;
  phrasalExAnswered = null;
  phrasalExSelected = null;
}
function phrasalExercisesHtml(){
  if(!phrasalExPool.length) setupPhrasalExPool();
  const total = phrasalExPool.length;
  if(!total) return `<div class="ex-empty">Nessun esercizio disponibile.</div>`;
  if(phrasalExPos >= total) phrasalExPos = 0;
  const word = phrasalExPool[phrasalExPos];
  const ex = PHRASAL_EXERCISES[word];
  if(!ex._shuffled){ ex._shuffled = [ex.answer, ...ex.distractors].sort(()=>Math.random()-0.5); }
  const optsHtml = ex._shuffled.map(opt=>{
    let cls = '';
    if(phrasalExAnswered){
      if(opt === ex.answer) cls = 'correct';
      else if(opt === phrasalExSelected && opt !== ex.answer) cls = 'wrong';
    }
    const safeOpt = opt.replace(/'/g, "\\'");
    return `<button class="ex-option ${cls}" onclick="answerPhrasalEx('${safeOpt}')" ${phrasalExAnswered?'disabled':''}>${opt}</button>`;
  }).join('');
  return `
    <div class="word-count">Esercizio ${phrasalExPos+1} di ${total}</div>
    <div class="ex-sentence">${ex.sentence.replace('___', '<span class="ex-blank">______</span>')}</div>
    <div class="ex-options">${optsHtml}</div>
    ${phrasalExAnswered ? `<button class="navbtn ex-next" onclick="nextPhrasalEx()">Prossimo →</button>` : ''}
  `;
}
window.answerPhrasalEx = function(opt){
  if(phrasalExAnswered) return;
  phrasalExSelected = opt;
  phrasalExAnswered = true;
  render();
};
window.nextPhrasalEx = function(){
  phrasalExPos++;
  phrasalExAnswered = null;
  phrasalExSelected = null;
  render();
};

function renderPhrasal(){
  const app = document.getElementById('app');
  let body = '';
  if(phrasalView === 'browse') body = phrasalBrowseHtml();
  else if(phrasalView === 'quiz') body = phrasalQuizHtml();
  else body = phrasalExercisesHtml();
  app.innerHTML = mainNavHtml() + `
    <h1>Phrasal Verbs</h1>
    <div class="sub">153 phrasal verb ad alta frequenza, con significato ed esercizi originali</div>
    <div class="vocab-subnav">
      <button class="${phrasalView==='browse'?'active':''}" onclick="switchPhrasalView('browse')">Sfoglia</button>
      <button class="${phrasalView==='quiz'?'active':''}" onclick="switchPhrasalView('quiz')">Quiz (retrieval)</button>
      <button class="${phrasalView==='exercises'?'active':''}" onclick="switchPhrasalView('exercises')">Esercizi</button>
    </div>
    ${body}
  `;
}
window.switchPhrasalView = function(v){ phrasalView = v; render(); };


function reviewDueHtml(){
  const due = computeDueList();
  if(!due.length) return `<div class="ex-empty">Nessuna parola da ripassare oggi. Torna domani, o aggiungine una tua dalla scheda "Aggiungi".</div>`;
  const item = due[0];
  const meaning = item.note || item.builtinMeaning;
  const sourceLabel = item.type === 'oxford' ? 'Oxford 3000' : (item.type === 'phrasal' ? 'Phrasal Verb' : 'Parola tua');
  const safeKey = item.key.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  let inner = '';
  if(reviewRevealed){
    if(reviewMeaningLoading){
      inner = `<div class="quiz-meta">Cerco il significato...</div>`;
    } else if(meaning){
      inner = `<div class="quiz-meta" style="max-width:300px;">${meaning}</div>`;
    } else {
      inner = `<div style="width:100%;">
        <textarea id="reviewNoteInput" class="vocab-search" style="min-height:60px; width:100%; font-family:'Inter';" placeholder="Scrivi qui il significato per ricordartelo meglio..."></textarea>
        <button class="navbtn" style="margin-top:8px;" onclick="saveReviewNote('${safeKey}')">Salva significato</button>
      </div>`;
    }
    inner += `<div class="quiz-actions">
        <button class="quiz-btn no" onclick="gradeReview('${safeKey}', false)">Non ricordata</button>
        <button class="quiz-btn yes" onclick="gradeReview('${safeKey}', true)">Ricordata</button>
      </div>`;
  } else {
    inner = `<div class="quiz-reveal" onclick="revealReview()">Mostra significato</div>`;
  }
  return `
    <div class="word-count">${due.length} da ripassare oggi</div>
    <div class="quiz-card">
      <div class="quiz-meta">${sourceLabel} · box ${item.box+1}/5</div>
      <div class="quiz-word">${item.word}</div>
      ${inner}
    </div>
  `;
}
window.revealReview = async function(){
  reviewRevealed = true;
  const due = computeDueList();
  const item = due[0];
  if(item && !item.note && !item.builtinMeaning && (item.type === 'oxford' || item.type === 'phrasal')){
    reviewMeaningLoading = true;
    render();
    const def = await fetchDefinition(item.word);
    if(def && reviewItems[item.key]){ reviewItems[item.key].builtinMeaning = def; saveReviewItems(); pushToCloud(); }
    reviewMeaningLoading = false;
  }
  render();
};
window.saveReviewNote = function(key){
  const el = document.getElementById('reviewNoteInput');
  const val = el ? el.value : '';
  if(reviewItems[key]){ reviewItems[key].note = val; saveReviewItems(); pushToCloud(); }
  render();
};
window.gradeReview = function(key, remembered){
  scheduleReview(key, remembered);
  reviewRevealed = false;
  reviewMeaningLoading = false;
  render();
};

function reviewAddHtml(){
  return `
    <div class="sub" style="margin-bottom:14px;">Aggiungi una parola o espressione che vuoi imparare, con il significato che preferisci (in italiano o inglese).</div>

window.addCustomWord = function(){

function reviewAllHtml(){
  const due = computeDueList();
  const upcoming = computeUpcomingList();
  const mastered = computeMasteredList();
  function row(item, extra){
    return `<div class="word-row"><span class="word-name">${item.word}</span><span style="font-size:11px; color:var(--ink-dim);">${extra}</span></div>`;
  }
  return `
    <div class="eyebrow" style="margin-bottom:6px; display:block;">Da ripassare oggi (${due.length})</div>

    <div class="eyebrow" style="margin-bottom:6px; display:block;">Imparate (${mastered.length})</div>
    <div class="word-list">${mastered.map(i=>row(i,'✓ imparata')).join('') || '<div class="ex-empty">Nessuna ancora</div>'}</div>

function renderReview(){
  const app = document.getElementById('app');
  let body = '';
  if(reviewSubview === 'due') body = reviewDueHtml();
  else if(reviewSubview === 'add') body = reviewAddHtml();
  else body = reviewAllHtml();
  const dueCount = computeDueList().length;
  app.innerHTML = mainNavHtml() + `
    <h1>Ripasso</h1>
    <div class="sub">Ripetizione dilazionata (metodo Leitner) — le parole tornano finché non le impari davvero</div>
    <div class="vocab-subnav">
      <button class="${reviewSubview==='due'?'active':''}" onclick="switchReviewView('due')">Da ripassare${dueCount?' ('+dueCount+')':''}</button>
      <button class="${reviewSubview==='add'?'active':''}" onclick="switchReviewView('add')">Aggiungi</button>
      <button class="${reviewSubview==='all'?'active':''}" onclick="switchReviewView('all')">Tutte</button>
    </div>
    ${body}
  `;
}
window.switchReviewView = function(v){ reviewSubview = v; render(); };


function computeTotalMinutes(){
  let total = 0;
  Object.values(progress).forEach(p=>{
    p.forEach((done,i)=>{ if(done) total += TASK_MINUTES[i] || 0; });
  });
  return total;
}
function computeStreaks(){
  let longest = 0, temp = 0;
  for(let i=0;i<SESSIONS.length;i++){
    if(isDone(i)){ temp++; longest = Math.max(longest, temp); } else { temp = 0; }
  }
  const nomIdx = nominalIndex();
  let current = 0;
  for(let i=nomIdx;i>=0;i--){ if(isDone(i)) current++; else break; }
  return {current, longest};
}
function buildCalendarMap(){
  const map = {};
  SESSIONS.forEach((s,idx)=>{
    const p = progress[idx];
    const doneCount = p ? p.filter(Boolean).length : 0;
    map[s.date] = doneCount;
  });
  return map;
}
function calendarHeatmapHtml(){
  const map = buildCalendarMap();
  const startISO = SESSIONS[0].date;
  const endISO = SESSIONS[SESSIONS.length-1].date;
  const start = new Date(startISO + "T00:00:00");
  const end = new Date(endISO + "T00:00:00");
  const dow = (start.getDay()+6)%7; // 0 = lunedi'
  const gridStart = new Date(start);
  gridStart.setDate(gridStart.getDate() - dow);

  let cells = [];
  let d = new Date(gridStart);
  while(d <= end){
    const iso = d.toISOString().slice(0,10);
    cells.push(iso);
    d.setDate(d.getDate()+1);
  }
  let weeks = [];
  for(let i=0;i<cells.length;i+=7){ weeks.push(cells.slice(i,i+7)); }

  const weeksHtml = weeks.map(week=>{
    const daysHtml = week.map(iso=>{
      if(iso < startISO || iso > endISO){
        return `<div class="cal-cell cal-empty"></div>`;
      }
      if(!(iso in map)){
        return `<div class="cal-cell cal-rest" title="${iso}: riposo"></div>`;
      }
      const n = map[iso];
      const level = n === 0 ? 0 : Math.ceil(n/7*4);
      return `<div class="cal-cell cal-level-${level}" title="${iso}: ${n}/7"></div>`;
    }).join('');
    return `<div class="cal-week">${daysHtml}</div>`;
  }).join('');

  return `
    <div class="cal-scroll"><div class="cal-grid">${weeksHtml}</div></div>
    <div class="cal-legend">
      <span>Meno</span>
      <span class="cal-cell cal-level-0" style="display:inline-block; background:var(--line);"></span>
      <span class="cal-cell cal-level-1" style="display:inline-block;"></span>
      <span class="cal-cell cal-level-2" style="display:inline-block;"></span>
      <span class="cal-cell cal-level-3" style="display:inline-block;"></span>
      <span class="cal-cell cal-level-4" style="display:inline-block;"></span>
      <span>Più</span>
    </div>
  `;
}
function weeklyRhythmHtml(){
  const nomIdx = nominalIndex();
  const dayNames = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const totals = [0,0,0,0,0,0,0];
  const counts = [0,0,0,0,0,0,0];
  for(let i=0;i<=nomIdx;i++){
    const s = SESSIONS[i];
    const d = new Date(s.date + "T00:00:00");
    const dow = (d.getDay()+6)%7;
    const p = progress[i];
    const frac = p ? p.filter(Boolean).length/7 : 0;
    totals[dow] += frac;
    counts[dow] += 1;
  }
  const avgs = totals.map((t,i)=> counts[i] ? (t/counts[i]) : 0);
  const maxAvg = Math.max(...avgs, 0.01);
  const bars = avgs.map((a,i)=>{
    const h = Math.max(4, Math.round((a/maxAvg)*90));
    return `<div class="rhythm-col"><div class="rhythm-bar" style="height:${h}px;" title="${Math.round(a*100)}%"></div><div class="rhythm-label">${dayNames[i]}</div></div>`;
  }).join('');
  return `<div class="rhythm-grid">${bars}</div>`;
}
function dashboardSettingsHtml(){
  return `
    <div class="dash-settings">
      <label>Data di inizio del piano</label>
      <input type="date" id="dashStartDate" value="${planStartDate}">
      <button class="navbtn" style="width:100%;" onclick="updateStartDate()">Salva nuova data di inizio</button>
      <div id="startDateConfirm" style="text-align:center; font-size:12.5px; color:var(--teal); margin-top:8px; min-height:16px;"></div>
    </div>
  `;
}
window.updateStartDate = function(){
  const val = document.getElementById('dashStartDate').value;
  if(!val) return;
  planStartDate = val;
  applyStartDateShift(val);
  savePlanStartDateLocal();
  pushToCloud();
  render();
  setTimeout(()=>{
    const el = document.getElementById('startDateConfirm');
    if(el) el.textContent = '✓ Data aggiornata a ' + val;
  }, 50);
};

function renderDashboard(){
  const app = document.getElementById('app');
  const pctDone = Math.round((Object.values(progress).reduce((a,p)=>a+p.filter(Boolean).length,0) / (SESSIONS.length*7))*100);
  const streaks = computeStreaks();
  const totalMin = computeTotalMinutes();
  const totalH = (totalMin/60).toFixed(1);
  const oxfordKnown = Object.values(vocabProgress).filter(v=>v==='known').length;
  const phrasalKnown = Object.values(phrasalProgress).filter(v=>v==='known').length;
  const mastered = computeMasteredList().length;
  const inReview = computeDueList().length + computeUpcomingList().length;

  app.innerHTML = mainNavHtml() + `
    <h1>Dashboard</h1>
    <div class="sub">Il tuo percorso in numeri</div>

    <div class="dash-section">
      <div class="stat-grid">
        <div class="stat-card"><div class="n">${pctDone}%</div><div class="l">Piano completato</div></div>
        <div class="stat-card"><div class="n">🔥 ${streaks.current}</div><div class="l">Streak attuale</div></div>
        <div class="stat-card"><div class="n">${streaks.longest}</div><div class="l">Streak record</div></div>
        <div class="stat-card"><div class="n">${totalH}h</div><div class="l">Ore studiate (stima)</div></div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Calendario di studio</div>
      ${calendarHeatmapHtml()}
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Ritmo settimanale (dove sei più costante)</div>
      ${weeklyRhythmHtml()}
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Vocabolario</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="n">${oxfordKnown}/3000</div><div class="l">Oxford conosciute</div></div>
        <div class="stat-card"><div class="n">${phrasalKnown}/153</div><div class="l">Phrasal conosciuti</div></div>
        <div class="stat-card"><div class="n">${mastered}</div><div class="l">Parole imparate (ripasso)</div></div>
        <div class="stat-card"><div class="n">${inReview}</div><div class="l">In ripasso attivo</div></div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-section-title">Impostazioni</div>
      ${dashboardSettingsHtml()}
    </div>
  `;
}

function toggleOpen(i){
  const el = document.querySelectorAll('.task')[i];
  const body = el.querySelector('.task-body');
  const isOpen = el.classList.contains('open');
  if(isOpen){ el.classList.remove('open'); body.style.maxHeight = null; }
  else{ el.classList.add('open'); body.style.maxHeight = body.scrollHeight + 'px'; }
}
function toggleDone(i){
  const p = ensure(currentIndex);
  p[i] = !p[i];
  saveProgress(progress);
  render();
  pushToCloud().then(render);
}
function goTo(i){
  if(i<0 || i>=SESSIONS.length) return;
  currentIndex = i;
  render();
}

window.toggleOpen = toggleOpen;
window.toggleDone = toggleDone;
window.goTo = goTo;
window.linkCode = linkCode;

render();
pullFromCloud().then(render);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
